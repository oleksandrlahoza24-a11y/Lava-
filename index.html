<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snowfield</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000510; touch-action:none; -webkit-user-select:none; user-select:none; }
  canvas { display:block; position:fixed; top:0; left:0; touch-action:none; cursor:crosshair; }
  #ui {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    color:rgba(180,210,255,0.50);
    font-family:'Share Tech Mono',monospace; font-size:11px;
    letter-spacing:5px; text-transform:uppercase; pointer-events:none;
    transition:opacity 2.5s; white-space:nowrap;
    text-shadow:0 0 16px rgba(140,180,255,0.5);
  }
  #ui.fade { opacity:0; }
  #badge {
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    color:rgba(180,210,255,0.28); font-family:'Share Tech Mono',monospace;
    font-size:10px; letter-spacing:7px; pointer-events:none; white-space:nowrap;
    text-shadow:0 0 10px rgba(140,180,255,0.3);
  }
  .corner { position:fixed; width:40px; height:40px; pointer-events:none; }
  #c1 { top:0;    left:0;    border-top:1px solid rgba(140,180,255,0.22); border-left:1px solid rgba(140,180,255,0.22); }
  #c2 { top:0;    right:0;   border-top:1px solid rgba(140,180,255,0.22); border-right:1px solid rgba(140,180,255,0.22); }
  #c3 { bottom:0; left:0;    border-bottom:1px solid rgba(140,180,255,0.22); border-left:1px solid rgba(140,180,255,0.22); }
  #c4 { bottom:0; right:0;   border-bottom:1px solid rgba(140,180,255,0.22); border-right:1px solid rgba(140,180,255,0.22); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="corner" id="c1"></div><div class="corner" id="c2"></div>
<div class="corner" id="c3"></div><div class="corner" id="c4"></div>
<div id="badge">H₂O · CRYSTALLINE</div>
<div id="ui">disturb the snow</div>
<script>
'use strict';
const canvas = document.getElementById('c');
const ui     = document.getElementById('ui');
const DPR    = Math.min(window.devicePixelRatio||1, 2);
let W=0, H=0, CW=0, CH=0;
function resize(){
  CW=window.innerWidth; CH=window.innerHeight;
  W=Math.round(CW*DPR); H=Math.round(CH*DPR);
  canvas.width=W; canvas.height=H;
  canvas.style.width=CW+'px'; canvas.style.height=CH+'px';
}
resize(); window.addEventListener('resize', resize);

const gl = canvas.getContext('webgl',{antialias:false,alpha:false,powerPreference:'high-performance'})
        || canvas.getContext('experimental-webgl',{antialias:false,alpha:false});
if(!gl){ document.body.innerHTML='<p style="color:#adf;font-family:monospace;padding:40px">WebGL unavailable</p>'; throw 0; }

const extFloat = gl.getExtension('OES_texture_float');
const extHalfF = gl.getExtension('OES_texture_half_float');
const extFL    = gl.getExtension('OES_texture_float_linear');
const extHL    = gl.getExtension('OES_texture_half_float_linear');
gl.getExtension('WEBGL_color_buffer_float');
gl.getExtension('EXT_color_buffer_half_float');

function canRT(type){
  const t=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,4,4,0,gl.RGBA,type,null);
  const f=gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER,f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t,0);
  const ok=gl.checkFramebufferStatus(gl.FRAMEBUFFER)===gl.FRAMEBUFFER_COMPLETE;
  gl.deleteFramebuffer(f); gl.deleteTexture(t); gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  return ok;
}
let FTYPE, ULIN, UINT8;
if(extFloat&&canRT(gl.FLOAT)){FTYPE=gl.FLOAT;ULIN=!!extFL;UINT8=false;}
else if(extHalfF&&canRT(extHalfF.HALF_FLOAT_OES)){FTYPE=extHalfF.HALF_FLOAT_OES;ULIN=!!extHL;UINT8=false;}
else{FTYPE=gl.UNSIGNED_BYTE;ULIN=true;UINT8=true;}

const S = 512;

const VERT = `attribute vec2 aPos; varying vec2 vUV;
void main(){ vUV=aPos*.5+.5; gl_Position=vec4(aPos,0,1); }`;

// --- Simulation shader (snow physics: higher damping, absorbing boundary) ---
const SIM = (UINT8?'#define U8\n':'') + `
precision highp float;
varying vec2 vUV;
uniform sampler2D uS;
uniform vec2 uTx;
uniform vec2 uM;
uniform float uR, uStr;
#ifdef U8
  vec2 enc(float v){float t=clamp(v*.5+.5,0.,.99999)*255.;return vec2(floor(t)/255.,fract(t));}
  float dec(vec2 v){return(v.x+v.y/255.)*2.-1.;}
  float C(vec2 u){return dec(texture2D(uS,u).rg);}
  float P(vec2 u){return dec(texture2D(uS,u).ba);}
#else
  float C(vec2 u){return texture2D(uS,u).r*2.-1.;}
  float P(vec2 u){return texture2D(uS,u).g*2.-1.;}
#endif
void main(){
  float c=C(vUV), p=P(vUV);
  float n=C(vUV+vec2(0.,uTx.y)), s=C(vUV-vec2(0.,uTx.y)),
        e2=C(vUV+vec2(uTx.x,0.)), w=C(vUV-vec2(uTx.x,0.));
  // Snow: higher damping (.991) — settles slower, less elastic than water
  float nx = (-p + (n+s+e2+w)*.5) * .991;
  // Strongly absorbing boundary — no wave reflections off edges
  float bx=min(vUV.x,1.-vUV.x)*16., by=min(vUV.y,1.-vUV.y)*16.;
  nx *= mix(.58, 1., clamp(min(bx,by),0.,1.));
  float dist = length(vUV - uM);
  nx -= smoothstep(uR, 0., dist) * uStr;
  nx = clamp(nx, -1., 1.);
  #ifdef U8
    gl_FragColor = vec4(enc(nx), enc(c));
  #else
    gl_FragColor = vec4(nx*.5+.5, c*.5+.5, 0., 1.);
  #endif
}`;

// --- Render shader: snow surface + falling flakes + night atmosphere ---
const RENDER = (UINT8?'#define U8\n':'') + `
precision highp float;
varying vec2 vUV;
uniform sampler2D uW;
uniform vec2 uTx;
uniform float uTime, uAspect;

float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }

float vnoise(vec2 p){
  vec2 i=floor(p), f=p-i;
  f=f*f*(3.-2.*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
}
float fbm(vec2 p){
  float v=0., a=.5;
  for(int i=0;i<5;i++){v+=vnoise(p)*a; p*=2.1; a*=.5;}
  return v;
}

#ifdef U8
  float H(vec2 uv){ vec4 s=texture2D(uW,uv); return(s.r+s.g/255.)*2.-1.; }
#else
  float H(vec2 uv){ return texture2D(uW,uv).r*2.-1.; }
#endif

float GGX(float ndh, float r){ float a=r*r*r*r, d=ndh*ndh*(a-1.)+1.; return a/(3.14159*d*d+1e-5); }

// One layer of falling snowflakes (procedural tiling)
float snowLayer(vec2 uv, float t, float scale, float speed, float windPhase, float sz){
  // Wind: gentle horizontal oscillation per layer
  float wx = sin(t*0.14 + windPhase)*0.45 + sin(t*0.09 + windPhase*1.7)*0.25;
  vec2 sg = uv * scale + vec2(wx * t * 0.055, -t * speed);
  vec2 si = floor(sg);
  vec2 sf = fract(sg);
  float h1 = hash(si);
  float h2 = hash(si + vec2(47.3, 0.));
  float h3 = hash(si + vec2(0.,  91.7));
  // ~28% of grid cells contain a flake
  float active = step(h3, 0.28);
  vec2 center = vec2(0.15 + h1*0.70, 0.15 + h2*0.70);
  float dist   = length(sf - center);
  float r      = sz * (0.45 + h1*0.55);
  // Soft bright core + faint glow halo
  float core = smoothstep(r, r*0.05, dist);
  float halo = smoothstep(r*2.8, 0., dist) * 0.28;
  return (core + halo) * active * (0.45 + h2*0.55);
}

void main(){
  vec2 uv = vUV;
  float t  = uTime;

  // ----- Normal from height field (Sobel) -----
  vec2 tx = uTx * 2.0;
  float hC  = H(uv);
  float hL  = H(uv - vec2(tx.x, 0.));
  float hR  = H(uv + vec2(tx.x, 0.));
  float hU  = H(uv + vec2(0., tx.y));
  float hD  = H(uv - vec2(0., tx.y));
  float hLU = H(uv + vec2(-tx.x,  tx.y));
  float hRU = H(uv + vec2( tx.x,  tx.y));
  float hLD = H(uv + vec2(-tx.x, -tx.y));
  float hRD = H(uv + vec2( tx.x, -tx.y));
  float ns  = 5.2;
  float dX  = (hRD + 2.*hR + hRU - hLD - 2.*hL - hLU)*ns/uAspect;
  float dY  = (hLU + 2.*hU + hRU - hLD - 2.*hD - hRD)*ns;
  vec3 N    = normalize(vec3(-dX, -dY, 1.));

  vec3 V  = vec3(0., 0., 1.);
  // Moonlight: high, slightly off-axis
  vec3 moonDir = normalize(vec3(-0.18, 0.55, 1.));
  vec3 halfV   = normalize(V + moonDir);

  float moonDiff = max(dot(N, moonDir), 0.);
  float NdotH    = max(dot(N, halfV), 0.);
  float cosI     = max(dot(N, V), 0.);
  float fresnel  = clamp(0.04 + 0.96*pow(1.-cosI, 5.), 0., 1.);

  // ----- Snow surface color -----
  // Deep crevice (blue-violet shadow) → mid-slope → bright peak
  vec3 creviceCol = vec3(0.030, 0.070, 0.200);
  vec3 midCol     = vec3(0.520, 0.680, 0.880);
  vec3 peakCol    = vec3(0.880, 0.940, 1.000);

  float hNorm = clamp(hC*2.6 + 0.50, 0., 1.);
  vec3 surfCol = mix(creviceCol, midCol,  smoothstep(0., 0.5, hNorm));
  surfCol      = mix(surfCol,    peakCol, smoothstep(0.5, 1., hNorm));

  // Micro-texture (grain + large undulation)
  float grain   = fbm(uv*42. + t*0.018);
  float undulate = fbm(uv*9.  + t*0.008 + 3.7);
  surfCol *= 0.80 + grain*0.28;
  surfCol  = mix(surfCol, peakCol, undulate*0.12);

  // Ambient occlusion: dark crevices, bright crests
  float ao = clamp(hC*3.2 + 0.55, 0., 1.);
  surfCol *= mix(0.18, 1.0, ao);

  // Moonlight diffuse + cold ambient fill
  vec3 moonColor = vec3(0.70, 0.82, 1.00);
  vec3 ambColor  = vec3(0.05, 0.09, 0.22);
  surfCol *= ambColor + moonColor * moonDiff * 1.15;

  // Subsurface scatter: snow glows blue-white at crests under light
  float sss = smoothstep(0., 0.35, hC) * moonDiff;
  surfCol  += vec3(0.55, 0.72, 1.00) * sss * 0.28;

  // Ice crystal sparkle — two animated frames for twinkle
  float spHash1 = hash(floor(uv*195. + floor(t*3.5)*79.1));
  float spHash2 = hash(floor(uv*240. + floor(t*4.2 + 1.)*61.3));
  float sparkle = (step(0.974, spHash1) + step(0.971, spHash2)*0.6) * moonDiff * clamp(hC*3.5, 0., 1.);
  surfCol += vec3(0.94, 0.97, 1.00) * sparkle * 1.6;

  // GGX specular (sharp moonlight glint on ice facets)
  float rough = max(0.012, 0.018 + abs(hC)*0.07);
  surfCol += moonColor * GGX(NdotH, rough) * moonDiff * 0.30 * fresnel;

  // Rim/edge glow — backlit translucency at ridge edges
  vec3 backL  = normalize(vec3(0.45, -0.25, 0.80));
  float rim   = pow(max(0., 1.-cosI), 2.8) * max(0., dot(N, backL));
  surfCol    += vec3(0.40, 0.60, 1.00) * rim * 0.20;

  // Laplacian (crest/trough curvature) — extra brightening on peaks
  float lap  = hU + hD + hL + hR - 4.*hC;
  float crest = smoothstep(0., 0.35, hC);
  surfCol    += vec3(0.75, 0.88, 1.00) * crest * max(0., -lap*5.) * 0.40;

  // ----- Night sky (visible in deep troughs via Fresnel) -----
  vec3 skyCol = vec3(0.008, 0.014, 0.048);
  // Stars: fine random field
  float starH  = hash(floor(uv*820.));
  float starH2 = hash(floor(uv*1240.));
  skyCol += step(0.994, starH)  * vec3(0.90, 0.94, 1.00) * 0.75;
  skyCol += step(0.996, starH2) * vec3(0.80, 0.88, 1.00) * 0.45;
  // Subtle aurora ribbon — thin horizontal glow
  float aurora = smoothstep(0.60, 0.75, vUV.y) * smoothstep(0.95, 0.75, vUV.y);
  aurora      *= (sin(uv.x*8.+t*0.22)*0.5+0.5) * (vnoise(uv*3.+t*0.1)*0.6+0.4);
  skyCol      += vec3(0.10, 0.55, 0.38) * aurora * 0.55;

  // Fresnel-weighted sky reflection in deep trough areas
  float skyMix = clamp(fresnel*0.35 + (1.-ao)*0.12, 0., 1.);
  surfCol = mix(surfCol, skyCol*0.6 + moonColor*0.25, skyMix);

  // Deepen the blue tint in shadowed/low areas
  vec3 deepBlue = vec3(0.015, 0.035, 0.120);
  surfCol = mix(surfCol, deepBlue, clamp(0.55 - hC*2.0, 0., 1.) * 0.50);

  // ----- Falling snowflakes (5 parallax layers) -----
  // Larger scale = farther away = smaller, faster (closer in depth map)
  float flakes = 0.;
  flakes += snowLayer(uv, t,  36., 0.110, 0.00, 0.0190) * 1.00;
  flakes += snowLayer(uv, t,  58., 0.165, 1.83, 0.0140) * 0.88;
  flakes += snowLayer(uv, t,  88., 0.230, 3.57, 0.0095) * 0.74;
  flakes += snowLayer(uv, t, 130., 0.310, 5.20, 0.0065) * 0.58;
  flakes += snowLayer(uv, t, 190., 0.400, 7.40, 0.0042) * 0.42;
  flakes  = clamp(flakes, 0., 1.);

  // Flakes: cold white with faint blue tint, brightened by moonlight
  vec3 flakeCol = mix(vec3(0.85, 0.90, 1.00), vec3(0.98, 0.99, 1.00), flakes);
  surfCol = mix(surfCol, flakeCol, flakes * 0.88);
  // Additive bloom so flakes glow against dark bg
  surfCol += vec3(0.60, 0.72, 1.00) * flakes * 0.35;

  // ----- Vignette -----
  vec2 vd = (vUV*2.-1.) * vec2(uAspect, 1.);
  surfCol *= clamp(1. - dot(vd,vd)*0.068, 0., 1.);

  // ----- Tone-map + gamma -----
  // Slightly cool (blue channel lifted a touch)
  surfCol.b = min(surfCol.b * 1.04, 1.0);
  surfCol = surfCol*(1.+surfCol*0.14)/(surfCol+0.80)*1.06;
  surfCol = pow(max(surfCol, vec3(0.)), vec3(1./2.2));

  // Atmospheric cold haze in shadows
  float lum  = dot(surfCol, vec3(0.299, 0.587, 0.114));
  surfCol    = mix(surfCol, vec3(0.08, 0.12, 0.28), (1.-lum)*0.10);

  gl_FragColor = vec4(surfCol, 1.);
}`;

// ----- Shader compilation -----
function mkSh(type, src){
  const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
function mkProg(fsrc){
  const p=gl.createProgram();
  gl.attachShader(p, mkSh(gl.VERTEX_SHADER, VERT));
  gl.attachShader(p, mkSh(gl.FRAGMENT_SHADER, fsrc));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  const u={}, n=gl.getProgramParameter(p,gl.ACTIVE_UNIFORMS);
  for(let i=0;i<n;i++){const x=gl.getActiveUniform(p,i); u[x.name]=gl.getUniformLocation(p,x.name);}
  return{p,u};
}

let simP, renP;
try{ simP=mkProg(SIM); renP=mkProg(RENDER); }
catch(e){ document.body.innerHTML=`<pre style="color:#adf;padding:20px;font-size:11px;white-space:pre-wrap">${e.message}</pre>`; throw e; }

const qb=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,qb);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
function bindQ(prog){
  gl.bindBuffer(gl.ARRAY_BUFFER,qb);
  const loc=gl.getAttribLocation(prog.p,'aPos');
  gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
}

function mkData(){
  const n=S*S*4;
  if(!UINT8){
    if(FTYPE===gl.FLOAT) return new Float32Array(n).fill(.5);
    return new Uint16Array(n).fill(0x3800);
  }
  const d=new Uint8Array(n);
  for(let i=0;i<n;i+=4){d[i]=127;d[i+1]=128;d[i+2]=127;d[i+3]=128;}
  return d;
}
function mkFBO(){
  const tex=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,S,S,0,gl.RGBA,FTYPE,mkData());
  const f=ULIN?gl.LINEAR:gl.NEAREST;
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,f);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,f);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  const fbo=gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null); return{tex,fbo};
}
let fboA=mkFBO(), fboB=mkFBO();

// ----- Input -----
const ptr={x:.5,y:.5,active:false,prevX:.5,prevY:.5};
let gone=false;
function toUV(cx,cy){return{x:cx/CW, y:1.-cy/CH};}
function dismiss(){if(gone)return; gone=true; ui.classList.add('fade'); setTimeout(()=>ui.style.display='none',3000);}
function onDown(e){const t=e.touches?e.touches[0]:e, uv=toUV(t.clientX,t.clientY); ptr.prevX=uv.x;ptr.prevY=uv.y;ptr.x=uv.x;ptr.y=uv.y;ptr.active=true;dismiss();}
function onMove(e){if(!ptr.active)return; const t=e.touches?e.touches[0]:e; ptr.prevX=ptr.x;ptr.prevY=ptr.y; const uv=toUV(t.clientX,t.clientY);ptr.x=uv.x;ptr.y=uv.y;}
function onUp(){ptr.active=false;}
canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',onMove);
window.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',e=>{e.preventDefault();onDown(e);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();onMove(e);},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();onUp();},{passive:false});

// Autonomous snowflake landings: frequent, small, gentle
const drops=[]; let lastDrop=0;
function spawnDrop(now){
  const gap = ptr.active ? 9999 : (90 + Math.random()*200);
  if(now-lastDrop < gap) return; lastDrop=now;
  drops.push({
    x: .04 + Math.random()*.92,
    y: .04 + Math.random()*.92,
    str: 0.030 + Math.random()*0.065,
    born: now,
    ttl:  10  + Math.random()*22
  });
}

function simulate(src,dst,mx,my,active,str){
  gl.bindFramebuffer(gl.FRAMEBUFFER,dst.fbo); gl.viewport(0,0,S,S);
  gl.useProgram(simP.p); bindQ(simP);
  const u=simP.u;
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,src.tex);
  gl.uniform1i(u.uS,0); gl.uniform2f(u.uTx,1./S,1./S);
  gl.uniform2f(u.uM,mx,my); gl.uniform1f(u.uR,.042); gl.uniform1f(u.uStr,active?str:0.);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

let time=0;
function render(src){
  gl.bindFramebuffer(gl.FRAMEBUFFER,null); gl.viewport(0,0,W,H);
  gl.useProgram(renP.p); bindQ(renP);
  const u=renP.u;
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,src.tex);
  gl.uniform1i(u.uW,0); gl.uniform2f(u.uTx,1./S,1./S);
  gl.uniform1f(u.uTime,time); gl.uniform1f(u.uAspect,W/H);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

function frame(now){
  requestAnimationFrame(frame); time=now*.001;
  spawnDrop(now);
  let mx=ptr.x, my=ptr.y, ma=ptr.active, ms=.18;
  if(!ma&&drops.length>0){
    const d=drops[0];
    if(now-d.born < d.ttl){mx=d.x;my=d.y;ma=true;ms=d.str;}
    else drops.shift();
  }
  if(ptr.active){
    const spd=Math.hypot(ptr.x-ptr.prevX,ptr.y-ptr.prevY);
    ms=Math.min(.08+spd*14., .48);
  }
  for(let i=0;i<4;i++){
    simulate(fboA,fboB,mx,my,ma&&i<2,ms);
    const tmp=fboA; fboA=fboB; fboB=tmp;
  }
  render(fboA);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
