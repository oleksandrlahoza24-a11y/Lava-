<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Acid Pool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:#010802;
    touch-action:none;
    -webkit-user-select:none;
    user-select:none;
  }
  canvas {
    display:block;
    position:fixed;
    top:0; left:0;
    touch-action:none;
    cursor:crosshair;
  }
  #hint {
    position:fixed;
    bottom:32px;
    left:50%;
    transform:translateX(-50%);
    color:rgba(140,255,60,0.65);
    font-family:'Share Tech Mono', monospace;
    font-size:12px;
    letter-spacing:6px;
    text-transform:uppercase;
    pointer-events:none;
    transition:opacity 2.5s ease;
    text-shadow:0 0 18px rgba(100,255,30,0.6), 0 0 40px rgba(60,200,0,0.3);
    white-space:nowrap;
  }
  #hint.fade { opacity:0; }
  #label {
    position:fixed;
    top:24px;
    left:50%;
    transform:translateX(-50%);
    color:rgba(140,255,60,0.35);
    font-family:'Share Tech Mono', monospace;
    font-size:10px;
    letter-spacing:8px;
    text-transform:uppercase;
    pointer-events:none;
    text-shadow:0 0 12px rgba(100,255,30,0.4);
    white-space:nowrap;
  }
  /* Hazard-stripe corner decorations */
  #tl, #tr, #bl, #br {
    position:fixed;
    width:48px; height:48px;
    pointer-events:none;
    opacity:0.25;
  }
  #tl { top:0;    left:0;    border-top:2px solid #8fff30; border-left:2px solid #8fff30; }
  #tr { top:0;    right:0;   border-top:2px solid #8fff30; border-right:2px solid #8fff30; }
  #bl { bottom:0; left:0;    border-bottom:2px solid #8fff30; border-left:2px solid #8fff30; }
  #br { bottom:0; right:0;   border-bottom:2px solid #8fff30; border-right:2px solid #8fff30; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tl"></div><div id="tr"></div><div id="bl"></div><div id="br"></div>
<div id="label">⚠ H₂SO₄ — CORROSIVE ⚠</div>
<div id="hint">⚗ touch the acid ⚗</div>
<script>
'use strict';

const canvas = document.getElementById('c');
const hint   = document.getElementById('hint');

const DPR = Math.min(window.devicePixelRatio || 1, 2);
let W = 0, H = 0;
let CW = 0, CH = 0;

function resize() {
  CW = window.innerWidth;
  CH = window.innerHeight;
  W  = Math.round(CW * DPR);
  H  = Math.round(CH * DPR);
  canvas.width        = W;
  canvas.height       = H;
  canvas.style.width  = CW + 'px';
  canvas.style.height = CH + 'px';
}
resize();
window.addEventListener('resize', resize);

const glOpts = { antialias:false, alpha:false, preserveDrawingBuffer:false, powerPreference:'high-performance' };
const gl = canvas.getContext('webgl', glOpts)
        || canvas.getContext('experimental-webgl', glOpts);

if (!gl) {
  document.body.style.cssText = 'background:#010802;display:flex;align-items:center;justify-content:center';
  document.body.innerHTML = '<p style="color:#8fff30;font-family:monospace;font-size:18px;text-align:center;line-height:2">WebGL not available<br><small style="opacity:.5">Try Chrome or Safari</small></p>';
  throw 0;
}

const extFloat    = gl.getExtension('OES_texture_float');
const extHalfF    = gl.getExtension('OES_texture_half_float');
const extFloatLin = gl.getExtension('OES_texture_float_linear');
const extHalfLin  = gl.getExtension('OES_texture_half_float_linear');
gl.getExtension('WEBGL_color_buffer_float');
gl.getExtension('EXT_color_buffer_half_float');

function canRenderTo(type) {
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 4, 4, 0, gl.RGBA, type, null);
  const f = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
  const ok = gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE;
  gl.deleteFramebuffer(f); gl.deleteTexture(t);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return ok;
}

let FTYPE, USE_LINEAR, UINT8;
if (extFloat && canRenderTo(gl.FLOAT)) {
  FTYPE = gl.FLOAT; USE_LINEAR = !!extFloatLin; UINT8 = false;
} else if (extHalfF && canRenderTo(extHalfF.HALF_FLOAT_OES)) {
  FTYPE = extHalfF.HALF_FLOAT_OES; USE_LINEAR = !!extHalfLin; UINT8 = false;
} else {
  FTYPE = gl.UNSIGNED_BYTE; USE_LINEAR = true; UINT8 = true;
}

const S = 512;

const VERT = `
attribute vec2 aPos;
varying   vec2 vUV;
void main() {
  vUV = aPos * 0.5 + 0.5;
  gl_Position = vec4(aPos, 0.0, 1.0);
}`;

// Simulation shader — identical wave physics, just palette-neutral
const SIM_FRAG = (UINT8 ? '#define UINT8_MODE\n' : '') + `
precision highp float;
varying vec2  vUV;
uniform sampler2D uState;
uniform vec2  uTexel;
uniform vec2  uMouse;
uniform float uRadius;
uniform float uStrength;

#ifdef UINT8_MODE
  vec2 enc16(float v) {
    float t   = clamp(v * 0.5 + 0.5, 0.0, 0.99999);
    float t255 = t * 255.0;
    return vec2(floor(t255) / 255.0, fract(t255));
  }
  float dec16(vec2 v) { return (v.x + v.y / 255.0) * 2.0 - 1.0; }
  float CURR(vec2 uv) { return dec16(texture2D(uState, uv).rg); }
  float PREV(vec2 uv) { return dec16(texture2D(uState, uv).ba); }
#else
  float CURR(vec2 uv) { return texture2D(uState, uv).r * 2.0 - 1.0; }
  float PREV(vec2 uv) { return texture2D(uState, uv).g * 2.0 - 1.0; }
#endif

void main() {
  float curr = CURR(vUV);
  float prev = PREV(vUV);
  float n = CURR(vUV + vec2( 0.0,      uTexel.y));
  float s = CURR(vUV - vec2( 0.0,      uTexel.y));
  float e = CURR(vUV + vec2( uTexel.x, 0.0     ));
  float w = CURR(vUV - vec2( uTexel.x, 0.0     ));
  float next = (-prev + (n + s + e + w) * 0.5) * 0.994;
  float bx = min(vUV.x, 1.0 - vUV.x) * 14.0;
  float by = min(vUV.y, 1.0 - vUV.y) * 14.0;
  next *= mix(0.78, 1.0, clamp(min(bx, by), 0.0, 1.0));
  float d = length(vUV - uMouse);
  next -= smoothstep(uRadius, 0.0, d) * uStrength;
  next  = clamp(next, -1.0, 1.0);
  #ifdef UINT8_MODE
    gl_FragColor = vec4(enc16(next), enc16(curr));
  #else
    gl_FragColor = vec4(next * 0.5 + 0.5, curr * 0.5 + 0.5, 0.0, 1.0);
  #endif
}`;

// Render shader — full acid aesthetic
const RENDER_FRAG = (UINT8 ? '#define UINT8_MODE\n' : '') + `
precision highp float;
varying vec2  vUV;
uniform sampler2D uWater;
uniform vec2  uTexel;
uniform float uTime;
uniform float uAspect;

float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453); }
float vnoise(vec2 p) {
  vec2 i = floor(p), f = p - i;
  f = f*f*(3.0 - 2.0*f);
  return mix(mix(hash(i),         hash(i+vec2(1,0)), f.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x), f.y);
}
float fbm(vec2 p) {
  float v=0.0, a=0.5;
  for(int i=0;i<5;i++){ v+=vnoise(p)*a; p*=2.1; a*=0.5; }
  return v;
}

// ── Toxic vapour sky (replaces ocean sky) ────────────────────────────────
vec3 getAcidSky(vec2 dir) {
  float t     = clamp(dir.y * 1.4, 0.0, 1.0);
  // Sickly yellow-green gradient
  vec3 sky    = mix(vec3(0.55, 0.80, 0.06), vec3(0.04, 0.18, 0.02), t*t);
  // Caustic "light source" — overhead toxic glow
  vec2 sunD   = normalize(vec2(0.20, 0.80));
  float sd    = dot(normalize(dir), sunD);
  sky += vec3(0.95, 1.00, 0.15) * pow(max(sd, 0.0), 160.0) * 5.0;
  sky += vec3(0.70, 1.00, 0.05) * pow(max(sd, 0.0),   4.0) * 0.55;
  // Toxic vapour clouds
  float cl    = fbm(dir*4.5+3.1) * fbm(dir*2.8+1.0);
  sky  = mix(sky, vec3(0.62, 0.90, 0.10), smoothstep(0.3, 0.65, cl)*0.55*(1.0-t));
  // Dark upper atmosphere
  sky  = mix(sky, vec3(0.02, 0.06, 0.01), t*t*t*0.6);
  return sky;
}

// ── Corroded / dissolved floor ───────────────────────────────────────────
vec3 getAcidFloor(vec2 uv) {
  float dr  = uTime * 0.018;
  // Eroded metal base — dark rust + bare steel
  float r1  = sin(uv.x * 28.0 + fbm(uv*3.5+dr)*4.5)*0.5+0.5;
  float r2  = sin(uv.y * 22.0 + fbm(uv*3.0+1.5+dr)*3.8)*0.5+0.5;
  float det = fbm(uv*14.0 + dr*0.4);
  // Corroded steel base
  vec3 base = mix(vec3(0.18, 0.16, 0.12), vec3(0.28, 0.24, 0.16), r1*r2*pow(det,0.6));
  // Rust patches (orange-brown)
  float rf  = smoothstep(0.50, 0.72, fbm(uv*4.2 + 2.0));
  base      = mix(base, vec3(0.52, 0.24, 0.04)*(0.6+0.3*fbm(uv*8.0+3.0)), rf*0.75);
  // Acid-etched green deposits
  float gd  = smoothstep(0.55, 0.78, fbm(uv*7.0+5.0))*smoothstep(0.48, 0.65, fbm(uv*4.5+7.0));
  base      = mix(base, vec3(0.12, 0.42, 0.04), gd * 0.80);
  // Bright toxic mineral deposits (chartreuse crystals)
  float cr  = step(0.80, hash(floor(uv*60.0)));
  base      = mix(base, vec3(0.65, 1.00, 0.05)*0.85, cr * 0.5);
  // Pitted surface noise
  float pit = smoothstep(0.70, 0.90, fbm(uv*20.0+dr));
  base     *= 1.0 - pit * 0.35;
  return base;
}

#ifdef UINT8_MODE
  float H(vec2 uv) {
    vec4 s = texture2D(uWater, uv);
    return (s.r + s.g / 255.0) * 2.0 - 1.0;
  }
#else
  float H(vec2 uv) { return texture2D(uWater, uv).r * 2.0 - 1.0; }
#endif

float GGX(float NdotH, float rough) {
  float a2 = rough*rough*rough*rough;
  float d  = NdotH*NdotH*(a2-1.0)+1.0;
  return a2 / (3.14159*d*d + 1e-5);
}

void main() {
  vec2 uv = vUV;
  vec2 tx = uTexel * 2.0;

  // ── 8-tap Sobel normal ───────────────────────────────────────────────────
  float hL  = H(uv - vec2(tx.x, 0.0));
  float hR  = H(uv + vec2(tx.x, 0.0));
  float hU  = H(uv + vec2(0.0,  tx.y));
  float hD  = H(uv - vec2(0.0,  tx.y));
  float hLU = H(uv + vec2(-tx.x,  tx.y));
  float hRU = H(uv + vec2( tx.x,  tx.y));
  float hLD = H(uv + vec2(-tx.x, -tx.y));
  float hRD = H(uv + vec2( tx.x, -tx.y));

  float ns = 5.2;
  float dX = (hRD + 2.0*hR + hRU - hLD - 2.0*hL - hLU) * ns / uAspect;
  float dY = (hLU + 2.0*hU + hRU - hLD - 2.0*hD - hRD) * ns;
  vec3 normal = normalize(vec3(-dX, -dY, 1.0));

  float h   = H(uv);
  vec3  V   = vec3(0.0, 0.0, 1.0);
  vec3  L   = normalize(vec3(0.20, 0.72, 1.0));
  vec3  Hv  = normalize(V + L);

  // ── Fresnel (acid IOR ~1.38, slightly higher than water) ─────────────────
  float cosI   = max(dot(normal, V), 0.0);
  float fresnel = 0.026 + 0.974 * pow(1.0 - cosI, 5.0);
  fresnel = clamp(fresnel, 0.0, 1.0);

  // ── Refraction ───────────────────────────────────────────────────────────
  vec2 refOff = vec2(normal.x / uAspect, normal.y) * 0.058;
  vec2 refUV  = clamp(uv + refOff, 0.001, 0.999);
  vec3 floor3 = getAcidFloor(refUV + vec2(uTime * 0.004, 0.0));

  // Beer-Lambert acid extinction — heavy green, kills red/blue fast
  floor3 *= exp(-vec3(2.40, 0.20, 2.80) * 2.2);

  // ── Caustics (acid focusing) ──────────────────────────────────────────────
  float lap = hU + hD + hL + hR - 4.0*h;
  float curvCaus = pow(max(0.0, -lap * 9.5), 1.7) * 2.2;
  vec2 cUV = refUV * vec2(uAspect*11.0, 11.0);
  float ca = sin(cUV.x*1.8 + uTime*3.0)*sin(cUV.y*1.7 + uTime*2.5)
           + sin(cUV.x*1.2 - uTime*2.1 + 1.0)*sin(cUV.y*1.3 - uTime*2.4 + 0.9)
           + sin((cUV.x+cUV.y)*1.2 + uTime*1.8)*0.5;
  // Acid caustics glow green-yellow
  float animCaus = pow(max(0.0, ca*0.2+0.5), 3.5) * 0.7;
  floor3 *= 1.0 + curvCaus + animCaus;

  // ── Vapour/sky reflection ─────────────────────────────────────────────────
  vec3 R   = reflect(-L, normal);
  vec3 sky = getAcidSky(R.xy * 0.5 + 0.5);

  // ── Acid body colour ──────────────────────────────────────────────────────
  // Deep: dark murky olive. Shallow: brilliant chartreuse-green
  vec3 deepCol    = vec3(0.01, 0.08, 0.00);
  vec3 shallowCol = vec3(0.22, 0.88, 0.04);
  vec3 acidCol    = mix(deepCol, shallowCol, clamp(0.5 + h*2.2, 0.0, 1.0));

  // ── Compose ───────────────────────────────────────────────────────────────
  vec3 col = mix(floor3, sky, clamp(fresnel*0.88 + 0.06, 0.0, 1.0));
  col = mix(col, acidCol, 0.22);

  // ── Sub-surface scattering through crests — neon green glow ──────────────
  float sss = smoothstep(-0.04, 0.28, h) * max(0.0, dot(normal, L));
  col += vec3(0.18, 1.00, 0.04) * sss * 0.38;

  // ── GGX specular ─────────────────────────────────────────────────────────
  float rough = max(0.010, 0.010 + abs(h)*0.07);
  float NdotH = max(dot(normal, Hv), 0.0);
  float NdotL = max(dot(normal, L),  0.0);
  float spec  = GGX(NdotH, rough);
  // Acid specular: yellow-white hot spot
  col += vec3(0.95, 1.00, 0.55) * spec * NdotL * 0.22 * fresnel;
  // Wide shimmer — green halo
  float RdotV = max(dot(R, V), 0.0);
  col += vec3(0.40, 1.00, 0.08) * pow(RdotV, 38.0) * 0.28;

  // ── Bubble foam at crests ─────────────────────────────────────────────────
  float crest  = smoothstep(0.16, 0.38, h);
  float foamN  = pow(fbm(uv*24.0 + uTime*1.0), 1.3);
  // Foam is pale yellow-white (acid froth)
  col = mix(col, vec3(0.90, 1.00, 0.65), crest*foamN*0.90);
  // Wake foam — green-tinted bubbles
  float wake = smoothstep(0.06, 0.18, abs(h)) * fbm(uv*18.0+uTime*0.5) * 0.18;
  col += vec3(0.45, 1.00, 0.10) * wake;

  // ── Slowly rising bubble dots ─────────────────────────────────────────────
  // Simulated via animated hash pattern — tiny bright specks
  vec2 bGrid = uv * vec2(uAspect * 40.0, 40.0);
  vec2 bCell  = floor(bGrid);
  vec2 bFrac  = fract(bGrid);
  float bRnd  = hash(bCell);
  float bRnd2 = hash(bCell + 17.3);
  float bRnd3 = hash(bCell + 31.7);
  float bRise = fract(uTime * (0.15 + bRnd3*0.25) + bRnd2);
  vec2  bPos  = vec2(0.3 + bRnd*0.4, bRise);
  float bDist = length(bFrac - bPos);
  float bubble = smoothstep(0.08, 0.0, bDist) * step(bRnd, 0.12);
  col = mix(col, vec3(0.80, 1.00, 0.50), bubble * 0.9);

  // ── Toxic vapour horizon haze ─────────────────────────────────────────────
  float fog = pow(clamp(1.0 - vUV.y*1.5, 0.0, 1.0), 4.0) * 0.28;
  col = mix(col, vec3(0.40, 0.72, 0.05), fog);

  // ── Vignette ─────────────────────────────────────────────────────────────
  vec2 vd = (vUV*2.0-1.0) * vec2(uAspect, 1.0);
  col *= clamp(1.0 - dot(vd,vd)*0.07, 0.0, 1.0);

  // ── Filmic tone-map + gamma ───────────────────────────────────────────────
  col = col*(1.0+col*0.16)/(col+0.90)*1.06;
  col = pow(max(col, vec3(0.0)), vec3(1.0/2.2));

  gl_FragColor = vec4(col, 1.0);
}`;

// ─── GL Helpers ─────────────────────────────────────────────────────────────
function mkShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    throw new Error('Shader compile: ' + gl.getShaderInfoLog(s));
  return s;
}

function mkProg(fsrc) {
  const p = gl.createProgram();
  gl.attachShader(p, mkShader(gl.VERTEX_SHADER,   VERT));
  gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fsrc));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS))
    throw new Error('Program link: ' + gl.getProgramInfoLog(p));
  const u = {};
  const n = gl.getProgramParameter(p, gl.ACTIVE_UNIFORMS);
  for (let i = 0; i < n; i++) {
    const info = gl.getActiveUniform(p, i);
    u[info.name] = gl.getUniformLocation(p, info.name);
  }
  return { p, u };
}

let simProg, renderProg;
try {
  simProg    = mkProg(SIM_FRAG);
  renderProg = mkProg(RENDER_FRAG);
} catch (e) {
  console.error(e);
  document.body.innerHTML = `<pre style="color:#8fff30;padding:20px;font-size:11px;white-space:pre-wrap">${e.message}</pre>`;
  throw e;
}

const qbuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, qbuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

function bindQuad(prog) {
  gl.bindBuffer(gl.ARRAY_BUFFER, qbuf);
  const loc = gl.getAttribLocation(prog.p, 'aPos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
}

function mkInitData() {
  const n = S * S * 4;
  if (!UINT8) {
    if (FTYPE === gl.FLOAT)              return new Float32Array(n).fill(0.5);
    if (FTYPE === extHalfF.HALF_FLOAT_OES) return new Uint16Array(n).fill(0x3800);
  }
  const d = new Uint8Array(n);
  for (let i = 0; i < n; i += 4) { d[i]=127; d[i+1]=128; d[i+2]=127; d[i+3]=128; }
  return d;
}

function mkFBO() {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, S, S, 0, gl.RGBA, FTYPE, mkInitData());
  const f = USE_LINEAR ? gl.LINEAR : gl.NEAREST;
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, f);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, f);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return { tex, fbo };
}

let fboA = mkFBO();
let fboB = mkFBO();

// ─── Input ──────────────────────────────────────────────────────────────────
const ptr = { x:0.5, y:0.5, active:false, prevX:0.5, prevY:0.5 };
let hintDismissed = false;

function toUV(cx, cy) {
  return { x: cx / CW, y: 1.0 - cy / CH };
}

function dismissHint() {
  if (hintDismissed) return;
  hintDismissed = true;
  hint.classList.add('fade');
  setTimeout(() => { hint.style.display = 'none'; }, 3000);
}

function onDown(e) {
  const t = e.touches ? e.touches[0] : e;
  const uv = toUV(t.clientX, t.clientY);
  ptr.prevX = uv.x; ptr.prevY = uv.y;
  ptr.x = uv.x; ptr.y = uv.y; ptr.active = true;
  dismissHint();
}
function onMove(e) {
  if (!ptr.active) return;
  const t = e.touches ? e.touches[0] : e;
  ptr.prevX = ptr.x; ptr.prevY = ptr.y;
  const uv = toUV(t.clientX, t.clientY);
  ptr.x = uv.x; ptr.y = uv.y;
}
function onUp() { ptr.active = false; }

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
window.addEventListener('mouseup',   onUp);
canvas.addEventListener('touchstart',  e => { e.preventDefault(); onDown(e); }, { passive:false });
canvas.addEventListener('touchmove',   e => { e.preventDefault(); onMove(e); }, { passive:false });
canvas.addEventListener('touchend',    e => { e.preventDefault(); onUp();    }, { passive:false });
canvas.addEventListener('touchcancel', e => { e.preventDefault(); onUp();    }, { passive:false });

// ─── Ambient acid drops / bubble events ─────────────────────────────────────
const drops = [];
let lastDrop = 0;

function maybeSpawnDrop(now) {
  // Acid bubbles up more frequently than rain
  const gap = ptr.active ? 5000 : (300 + Math.random() * 600);
  if (now - lastDrop < gap) return;
  lastDrop = now;
  drops.push({
    x:   0.06 + Math.random() * 0.88,
    y:   0.06 + Math.random() * 0.88,
    str: 0.08 + Math.random() * 0.18,
    born: now,
    ttl:  30  + Math.random() * 50
  });
}

function simulate(src, dst, mx, my, active, str) {
  gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fbo);
  gl.viewport(0, 0, S, S);
  gl.useProgram(simProg.p);
  bindQuad(simProg);
  const u = simProg.u;
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, src.tex);
  gl.uniform1i(u.uState,    0);
  gl.uniform2f(u.uTexel,    1.0/S, 1.0/S);
  gl.uniform2f(u.uMouse,    mx, my);
  gl.uniform1f(u.uRadius,   0.040);
  gl.uniform1f(u.uStrength, active ? str : 0.0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

let time = 0;

function render(src) {
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, W, H);
  gl.useProgram(renderProg.p);
  bindQuad(renderProg);
  const u = renderProg.u;
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, src.tex);
  gl.uniform1i(u.uWater,  0);
  gl.uniform2f(u.uTexel,  1.0/S, 1.0/S);
  gl.uniform1f(u.uTime,   time);
  gl.uniform1f(u.uAspect, W / H);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function frame(now) {
  requestAnimationFrame(frame);
  time = now * 0.001;

  maybeSpawnDrop(now);

  let mx = ptr.x, my = ptr.y, mactive = ptr.active, mstr = 0.18;

  if (!mactive && drops.length > 0) {
    const d = drops[0];
    if (now - d.born < d.ttl) {
      mx = d.x; my = d.y; mactive = true; mstr = d.str;
    } else { drops.shift(); }
  }

  if (ptr.active) {
    const spd = Math.hypot(ptr.x - ptr.prevX, ptr.y - ptr.prevY);
    mstr = Math.min(0.10 + spd * 18.0, 0.55);
  }

  for (let i = 0; i < 4; i++) {
    simulate(fboA, fboB, mx, my, mactive && i < 2, mstr);
    const tmp = fboA; fboA = fboB; fboB = tmp;
  }

  render(fboA);
}

requestAnimationFrame(frame);
</script>
